# Local demo stack. The credentials below are throwaway development values —
# deploying this file anywhere public requires replacing POSTGRES_PASSWORD and
# JWT_SECRET (the API refuses to boot in production without a real JWT_SECRET).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketdash
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketdash"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ticketdash
      JWT_SECRET: dev-only-change-me-in-production-0123456789
      PORT: 4000
      CLIENT_ORIGINS: http://localhost:8080
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
