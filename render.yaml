# Render Blueprint for the API (Docker). The frontend is hosted on Vercel and
# the database on Neon (Render's own free Postgres expires after 30 days).
#
# After the first deploy, set the two `sync: false` values in the dashboard:
#   DATABASE_URL    → Neon connection string (sslmode=require)
#   CLIENT_ORIGINS  → the Vercel production URL (e.g. https://<project>.vercel.app)
services:
  - type: web
    name: ticketdash-api
    runtime: docker
    plan: free
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGINS
        sync: false
