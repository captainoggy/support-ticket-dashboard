# Render Blueprint: one-click deploy of the API (Docker) and the static web app.
# The database is external (Neon free tier) — Render's free Postgres expires
# after 30 days, which is the wrong surprise mid-review.
#
# After the first deploy, set the three `sync: false` values in the dashboard:
#   ticketdash-api  → DATABASE_URL   (Neon connection string, sslmode=require)
#                   → CLIENT_ORIGINS (the web service's https URL)
#   ticketdash-web  → VITE_API_URL   (the API service's https URL)
services:
  - type: web
    name: ticketdash-api
    runtime: docker
    plan: free
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGINS
        sync: false

  - type: web
    name: ticketdash-web
    runtime: static
    buildCommand: npm ci && npm run build -w web
    staticPublishPath: web/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback: client-side routes resolve to index.html.
      - type: rewrite
        source: /*
        destination: /index.html
